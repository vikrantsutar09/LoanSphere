{% load static %}
<!DOCTYPE html>
<html>
<head>
    <title>Register - Smart Finance</title>

    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <link rel="stylesheet" href="{% static 'css/loan_head.css' %}">

    <link rel="icon" type="image/png" href="{% static 'image/favicon_io/favicon.ico' %}">
</head>

<body class="auth-bg">

<div class="auth-container fade-up">

    <!-- LEFT PANEL -->
    <div class="auth-left">

        <h1>Smart Finance</h1>

        <p>
            Secure. Fast. Trusted Loan Services.
        </p>

    </div>


    <!-- RIGHT PANEL -->
    <div class="auth-right">

        <h2>Create Account</h2>

        <form method="POST">

            {% csrf_token %}

            <input
                type="text"
                name="name"
                placeholder="Full Name"
                required
            >

            <input
                type="email"
                name="email"
                placeholder="Email Address"
                required
            >

            <input
                type="text"
                name="phone"
                placeholder="Phone Number"
                required
            >

            <input
                type="password"
                name="password"
                placeholder="Password"
                required
            >

            <button type="submit">
                Register
            </button>

        </form>

        <p class="register-link">
            Already have an account?
            <a href="{% url 'loan_head:login' %}">Login</a> 
        </p>

    </div>

</div>

</body>
</html>
