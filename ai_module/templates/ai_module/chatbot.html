<!DOCTYPE html>
<html>
<head>
    <title>Smart Finance Chatbot</title>
</head>
<body>
    <h2>Smart Finance Loan Chatbot</h2>

    <div id="chat-box"></div>

    <input type="text" id="user-input" placeholder="Type message...">
    <button onclick="sendMessage()">Send</button>

    <script>
        function sendMessage() {
            let message = document.getElementById("user-input").value;

            fetch("/ai/get-response/", {
                method: "POST",
                headers: {
                    "Content-Type": "application/json",
                    "X-CSRFToken": getCookie("csrftoken")
                },
                body: JSON.stringify({ message: message })
            })
            .then(response => response.json())
            .then(data => {
                document.getElementById("chat-box").innerHTML += 
                    "<p><b>You:</b> " + message + "</p>" +
                    "<p><b>Bot:</b> " + data.response + "</p>";
            });
        }

        function getCookie(name) {
            let cookieValue = null;
            if (document.cookie && document.cookie !== '') {
                const cookies = document.cookie.split(';');
                for (let i = 0; i < cookies.length; i++) {
                    const cookie = cookies[i].trim();
                    if (cookie.substring(0, name.length + 1) === (name + '=')) {
                        cookieValue = decodeURIComponent(cookie.substring(name.length + 1));
                        break;
                    }
                }
            }
            return cookieValue;
        }
    </script>
</body>
</html>
