{% load static %}
<!DOCTYPE html>
<html>
<head>
    <title>Admin Register</title>

    <link rel="icon" type="image/png" href="{% static 'image/favicon_io/favicon.ico' %}">

    <link rel="stylesheet" href="{% static 'css/admin.css' %}">
</head>

<body>

<div class="admin-login-wrapper">

    <div class="admin-login-card">

        <!-- LEFT SIDE -->
        <div class="login-left">

            <h2>LoanSphere</h2>

            <p>
                Create an administrator account to manage
                loan heads, categories, packages and
                financial configurations securely.
            </p>

        </div>


        <!-- RIGHT SIDE -->
        <div class="login-right">

            <h3>Admin Registration</h3>

            <form method="POST">

                {% csrf_token %}

                <div class="input-group">
                    <input type="text" name="name" placeholder="Full Name" required>
                </div>

                <div class="input-group">
                    <input type="email" name="email" placeholder="Admin Email" required>
                </div>

                <div class="input-group">
                    <input type="text" name="phone" placeholder="Phone Number" required>
                </div>

                <div class="input-group">
                    <input type="password" name="password" placeholder="Password" required>
                </div>

                <button type="submit" class="login-btn">
                    Register
                </button>

            </form>

            <p style="margin-top:20px; font-size:14px; opacity:.8;">
                Already have an account?
                <a href="{% url 'admin_panel:login' %}" style="color:#00ffb3;">
                    Login
                </a>
            </p>

        </div>

    </div>

</div>

</body>
</html>
